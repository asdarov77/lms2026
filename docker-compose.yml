version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: lms2025_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: lms2025_test
      POSTGRES_USER: laravel
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U laravel"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Laravel Application (PHP-FPM)
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: lms2025_app
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      APP_ENV: testing
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: lms2025_test
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      CACHE_DRIVER: array
      SESSION_DRIVER: array
      QUEUE_CONNECTION: sync
      MAIL_MAILER: log
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        php artisan migrate:fresh --force && 
        php artisan db:seed --force &&
        php artisan serve --host=0.0.0.0 --port=8000
      "

  # Node.js for frontend and Playwright
  node:
    image: node:20-alpine
    container_name: lms2025_node
    working_dir: /app
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    environment:
      NODE_ENV: development
      APP_URL: http://app:8000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: lms2025_test
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      USE_MCP_DB: "true"
    depends_on:
      - app
      - postgres
    command: >
      sh -c "
        npm ci &&
        npm run build &&
        echo '🚀 Frontend built and ready' &&
        tail -f /dev/null
      "

  # Playwright test runner
  playwright:
    image: mcr.microsoft.com/playwright:v1.58.2-jammy
    container_name: lms2025_playwright
    working_dir: /app
    volumes:
      - ./:/app
      - playwright_cache:/ms-playwright
    environment:
      APP_URL: http://app:8000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: lms2025_test
      DB_USERNAME: laravel
      DB_PASSWORD: secret
      USE_MCP_DB: "true"
      PLAYWRIGHT_BROWSERS_PATH: /ms-playwright
    depends_on:
      - app
      - postgres
      - node
    command: >
      sh -c "
        npm ci &&
        npx playwright install --with-deps chromium firefox webkit &&
        echo '✅ Playwright ready. Run with: docker exec lms2025_playwright npm test' &&
        tail -f /dev/null
      "

volumes:
  postgres_data:
  node_modules:
  playwright_cache:

networks:
  default:
    name: lms2025_network