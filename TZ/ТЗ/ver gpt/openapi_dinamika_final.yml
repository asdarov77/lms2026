openapi: 3.0.3
info:
  title: Dinamika LMS API
  version: "1.0.0"
servers:
  - url: /api/v1
paths:
  /auth/login:
    post:
      summary: User login
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                password:
                  type: string
              required: [email, password]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Unauthorized
  /auth/logout:
    post:
      summary: Logout current user
      security:
        - bearerAuth: []
      responses:
        '204':
          description: No Content
  /courses:
    get:
      summary: List courses
      parameters:
        - in: query
          name: page
          schema: {type: integer, default: 1}
        - in: query
          name: per_page
          schema: {type: integer, default: 20}
        - in: query
          name: q
          schema: {type: string}
      responses:
        '200':
          description: Course list
    post:
      summary: Create course
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseCreate'
      responses:
        '201':
          description: Created
  /courses/{id}/lessons:
    get:
      summary: Get lessons of a course
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      responses:
        '200':
          description: Lessons list
  /tests/{id}/submit:
    post:
      summary: Submit answers for test
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: {type: integer}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                answers:
                  type: array
                  items:
                    type: object
      responses:
        '200':
          description: Test result
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    AuthResponse:
      type: object
      properties:
        user:
          type: object
        token:
          type: string
        expires_in:
          type: integer
    CourseCreate:
      type: object
      properties:
        title: { type: string }
        short_description: { type: string }
        aircraft_id: { type: integer }
      required: [title, aircraft_id]