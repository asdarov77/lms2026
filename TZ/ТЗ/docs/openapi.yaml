openapi: 3.0.3
info:
  title: Dinamika LMS API
  version: "1.0.0"
servers:
  - url: /api/v1
paths:
  /auth/login:
    post:
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Auth successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Unauthorized
  /auth/logout:
    post:
      summary: Logout current user
      security:
        - bearerAuth: []
      responses:
        '204': { description: No Content }
  /users:
    get:
      summary: List users
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: per_page
          schema: { type: integer }
        - in: query
          name: q
          schema: { type: string }
      responses:
        '200':
          description: Users list
  /courses:
    get:
      summary: List courses
      parameters:
        - in: query
          name: page
          schema: { type: integer }
        - in: query
          name: per_page
          schema: { type: integer }
        - in: query
          name: q
          schema: { type: string }
      responses:
        '200': { description: OK }
    post:
      summary: Create course
      security: [ { bearerAuth: [] } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CourseCreate'
      responses:
        '201': { description: Created }
  /courses/{id}:
    get:
      summary: Get course by id
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
  /courses/{id}/lessons:
    get:
      summary: Get lessons list for a course
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200': { description: OK }
  /tests/{id}/submit:
    post:
      summary: Submit answers
      security: [ { bearerAuth: [] } ]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestSubmission'
      responses:
        '200': { description: Test Result }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    AuthRequest:
      type: object
      properties:
        email: { type: string }
        password: { type: string }
      required: [email, password]
    AuthResponse:
      type: object
      properties:
        success: { type: boolean }
        data:
          type: object
          properties:
            token: { type: string }
            user: { type: object }
    User:
      type: object
      properties:
        id: { type: integer }
        fio: { type: string }
        email: { type: string }
    CourseCreate:
      type: object
      properties:
        title: { type: string }
        short_description: { type: string }
        aircraft_id: { type: integer }
      required: [title]
    TestSubmission:
      type: object
      properties:
        answers:
          type: array
          items:
            type: object
            properties:
              question_id: { type: integer }
              choice_ids:
                type: array
                items: { type: integer }